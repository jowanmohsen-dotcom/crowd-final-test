<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password | Crowd Analyzing</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    color-scheme: dark;
    --bg: #140f1f;
    --panel: rgba(32, 22, 46, 0.95);
    --panel-border: rgba(255,255,255,0.12);
    --text: #f6efe9;
    --muted: #c2aea5;
    --accent-a: #9b1040;
    --accent-b: #e6a26d;
    --error: #ef4444;
    --ok: #22c55e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background:
      radial-gradient(circle at top left, rgba(155,16,64,0.28), transparent 38%),
      radial-gradient(circle at bottom right, rgba(230,162,109,0.18), transparent 35%),
      var(--bg);
    color: var(--text);
    font-family: Roboto, sans-serif;
  }
  .card {
    width: 100%;
    max-width: 480px;
    padding: 28px;
    border-radius: 24px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    box-shadow: 0 30px 80px rgba(0,0,0,0.35);
  }
  h1 {
    margin: 0 0 10px 0;
    font-family: Montserrat, sans-serif;
    font-size: 30px;
    line-height: 1.05;
    font-weight: 900;
  }
  p {
    margin: 0;
    color: var(--muted);
    line-height: 1.8;
  }
  label {
    display: block;
    margin-bottom: 8px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: Montserrat, sans-serif;
  }
  input {
    width: 100%;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(14,10,22,0.68);
    color: var(--text);
    padding: 14px 16px;
    font-size: 15px;
    outline: none;
  }
  input:focus {
    border-color: rgba(230,162,109,0.5);
    box-shadow: 0 0 0 3px rgba(230,162,109,0.12);
  }
  .stack { display: grid; gap: 16px; }
  .status {
    padding: 14px 16px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    font-size: 14px;
    line-height: 1.8;
  }
  .status.error {
    border-color: rgba(239,68,68,0.28);
    background: rgba(239,68,68,0.1);
    color: #fecaca;
  }
  .status.success {
    border-color: rgba(34,197,94,0.28);
    background: rgba(34,197,94,0.1);
    color: #bbf7d0;
  }
  button, .link-btn {
    width: 100%;
    border: 0;
    border-radius: 16px;
    padding: 15px 18px;
    font-size: 16px;
    font-weight: 800;
    font-family: Montserrat, sans-serif;
    cursor: pointer;
    color: #ffffff;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  button[disabled] {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .hint {
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>
<body>
  <div class="card">
    <div style="margin-bottom:20px;">
      <h1>Reset your password</h1>
      <p id="subtitle">Checking your reset link…</p>
    </div>

    <div id="status" class="status">Please wait while we validate this password reset link.</div>

    <form id="reset-form" class="stack" style="margin-top:18px;display:none;">
      <div>
        <label for="new-password">New Password</label>
        <input id="new-password" type="password" placeholder="Minimum 8 characters" minlength="8" required />
      </div>
      <div>
        <label for="confirm-password">Confirm Password</label>
        <input id="confirm-password" type="password" placeholder="Re-enter your new password" minlength="8" required />
      </div>
      <button id="submit-btn" type="submit">Update Password</button>
      <div class="hint">This page works only for customer and organizer accounts. Staff passwords stay managed by the organizer.</div>
    </form>

    <div id="after-success" class="stack" style="margin-top:18px;display:none;">
      <a class="link-btn" href="/#login">Back to Login</a>
    </div>
  </div>

<script>
  (function() {
    var token = new URLSearchParams(window.location.search).get('token') || '';
    var statusEl = document.getElementById('status');
    var subtitleEl = document.getElementById('subtitle');
    var formEl = document.getElementById('reset-form');
    var submitBtn = document.getElementById('submit-btn');
    var afterSuccessEl = document.getElementById('after-success');

    function setStatus(message, mode) {
      statusEl.textContent = message;
      statusEl.className = 'status' + (mode ? ' ' + mode : '');
    }

    function disableForm() {
      formEl.style.display = 'none';
      submitBtn.disabled = true;
    }

    function enableForm() {
      formEl.style.display = 'grid';
      submitBtn.disabled = false;
    }

    if (!token) {
      subtitleEl.textContent = 'This reset link is missing its token.';
      setStatus('This password reset link is incomplete. Please request a new one from the login page.', 'error');
      disableForm();
      afterSuccessEl.style.display = 'grid';
      return;
    }

    fetch('/api/password-reset/verify?token=' + encodeURIComponent(token))
      .then(function(response) {
        return response.json().then(function(data) {
          return { ok: response.ok, status: response.status, data: data };
        });
      })
      .then(function(result) {
        if (!result.ok) {
          subtitleEl.textContent = 'This reset link cannot be used right now.';
          setStatus(result.data.message || 'Unable to verify this reset link.', 'error');
          disableForm();
          afterSuccessEl.style.display = 'grid';
          return;
        }

        subtitleEl.textContent = 'Create a new password for ' + (result.data.email || 'your account') + '.';
        setStatus('Reset link verified. Enter your new password below.', '');
        enableForm();
      })
      .catch(function() {
        subtitleEl.textContent = 'We could not verify the link.';
        setStatus('A server error occurred while verifying the reset link. Please try again later.', 'error');
        disableForm();
        afterSuccessEl.style.display = 'grid';
      });

    formEl.addEventListener('submit', function(event) {
      event.preventDefault();

      var password = document.getElementById('new-password').value;
      var confirmPassword = document.getElementById('confirm-password').value;

      submitBtn.disabled = true;
      setStatus('Updating your password…', '');

      fetch('/api/password-reset/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token: token,
          password: password,
          confirm_password: confirmPassword
        })
      })
      .then(function(response) {
        return response.json().then(function(data) {
          return { ok: response.ok, data: data };
        });
      })
      .then(function(result) {
        if (!result.ok) {
          submitBtn.disabled = false;
          setStatus(result.data.message || 'Unable to update your password.', 'error');
          return;
        }

        subtitleEl.textContent = 'Your new password is ready.';
        setStatus(result.data.message || 'Password reset successful.', 'success');
        formEl.style.display = 'none';
        afterSuccessEl.style.display = 'grid';
      })
      .catch(function() {
        submitBtn.disabled = false;
        setStatus('A server error occurred while updating the password. Please try again.', 'error');
      });
    });
  })();
</script>
</body>
</html>
